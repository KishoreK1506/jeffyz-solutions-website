<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PC Recommendations | Jeffyz Solutions</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="pc-consultation.css" />
  <style>
    .resultsHeader{display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:12px}
    .resultsHeader h1{margin:0; font-size:22px}
    .metaRow{display:flex; gap:10px; flex-wrap:wrap}
    .tierGrid{display:grid; grid-template-columns:1fr; gap:12px}
    .tier{background: rgba(255,255,255,.03); border:1px solid var(--line); border-radius:16px; padding:14px;}
    .tierTop{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; align-items:center}
    .tierName{font-weight:800}
    .badge{padding:6px 10px; border-radius:999px; border:1px solid var(--line); background: rgba(255,255,255,.04); font-size:12px; color: var(--muted);}
    .recGrid{display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; margin-top:10px}
    @media (max-width: 980px){ .recGrid{grid-template-columns:1fr} }
    .recCard{background: rgba(255,255,255,.03); border:1px solid var(--line); border-radius:16px; padding:14px; display:flex; flex-direction:column; gap:10px; min-height:220px;}
    .recTitle{font-weight:800}
    .kv{display:grid; grid-template-columns: 82px 1fr; gap:6px; font-size:13px; color: var(--muted)}
    .progress{height:10px; border-radius:999px; overflow:hidden; background: rgba(255,255,255,.08); border:1px solid var(--line);}
    .progress > div{height:100%; background: rgba(255,255,255,.28)}
    .barLabel{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin:8px 0 6px}
    .btn.small{padding:8px 10px; border-radius:12px; font-size:13px}
    .note{margin-top:12px; color:var(--muted); font-size:12px}
    .warn{color:#facc15}
    .rowBtns{display:flex; gap:10px; flex-wrap:wrap}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="assets/logo.png" alt="Jeffyz Solutions logo" />
      <div>
        <div class="brand-title">Recommendations</div>
        <div class="brand-sub">Low to high suggestions with quick search links</div>
      </div>
    </div>
    <nav class="nav">
      <a href="pc-consultation.html">Back</a>
      <a href="services.html">Services</a>
      <a href="ai-support.html">AI Support</a>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main class="container" style="grid-template-columns: 1fr;">
    <section class="panel">
      <div class="resultsHeader">
        <div>
          <h1 id="title">Your Recommendations</h1>
          <div class="metaRow" id="chips"></div>
        </div>
        <div class="metaRow">
          <button class="btn" id="reset">Start Over</button>
          <button class="btn primary" id="print">Print / Save PDF</button>
        </div>
      </div>

      <div class="tierGrid" id="tiers"></div>

      <div class="note">
        <span class="warn">Note:</span> Model examples are illustrative. Use the search buttons to check current stock and pricing.
      </div>
    </section>
  </main>

  <script src="pc-results.js"></script>
</body>
</html>
